upstream backend_api {
    server backend:8000;
}

upstream frontend_app {
    server frontend:80;
}

upstream sandbox_provisioner {
    server sandbox-provisioner:8090;
}

# HTTP → HTTPS redirect (LAN browsers)
# Cloudflare tunnel connects to port 8080 (see below)
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/spark.crt;
    ssl_certificate_key /etc/nginx/ssl/spark.key;

    client_max_body_size 100M;

    # Frontend (admin)
    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth POST endpoints → backend (register/reset-password/etc)
    # GET /auth/login is a frontend SPA route, must NOT be proxied
    location /auth/register-direct { proxy_pass http://backend_api/auth/register-direct; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /auth/register { proxy_pass http://backend_api/auth/register; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /auth/reset-password { proxy_pass http://backend_api/auth/reset-password; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /auth/change-password { proxy_pass http://backend_api/auth/change-password; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /auth/verify-email { proxy_pass http://backend_api/auth/verify-email; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /auth/request-reset { proxy_pass http://backend_api/auth/request-reset; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /auth/resend-verification { proxy_pass http://backend_api/auth/resend-verification; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /auth/keys { proxy_pass http://backend_api/auth/keys; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }

    location /oauth/ {
        proxy_pass http://backend_api/oauth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API: /api/xxx → backend:8000/xxx
    location /api/ {
        proxy_pass http://backend_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeout for long-running requests (SSE/streaming)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # OpenClaw API & Docs: /openclaw-console/ → openclaw-lirh:8080/
    # Swagger UI fetches /openapi.json with absolute path, so we rewrite it
    location /openclaw-console/ {
        proxy_pass http://openclaw-lirh:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Rewrite absolute paths in Swagger HTML so /openapi.json → /openclaw-console/openapi.json
        sub_filter "url: '/openapi.json'" "url: '/openclaw-console/openapi.json'";
        sub_filter_once on;
        sub_filter_types text/html;
    }

    # OpenClaw UI: /openclaw-ui → per-user gateway (via cookie) or central gateway (fallback)
    location /openclaw-ui/ {
        resolver 127.0.0.11 valid=10s;
        set $openclaw_target openclaw-gateway;
        if ($cookie_openclaw_sandbox) {
            set $openclaw_target openclaw-$cookie_openclaw_sandbox;
        }
        proxy_pass http://$openclaw_target:18789/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header X-Frame-Options;
        add_header Content-Security-Policy "frame-ancestors 'self'" always;
    }

    # Per-user OpenClaw UI: /openclaw-user/{username}[/path] → openclaw-{username}:18789/[path]
    # Auto-provisions sandbox on 502 (container not found)
    location ~ ^/openclaw-user/([a-zA-Z0-9_-]+)(?:/(.*))?$ {
        resolver 127.0.0.11 valid=10s;
        set $openclaw_user $1;
        set $openclaw_path $2;
        proxy_pass http://openclaw-$openclaw_user:18789/$openclaw_path;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header X-Frame-Options;
        add_header Content-Security-Policy "frame-ancestors 'self'" always;
        # Auto-provision: on 502, redirect to provisioner
        proxy_intercept_errors on;
        error_page 502 = @provision_sandbox;
    }

    location @provision_sandbox {
        # Redirect to provisioner with original URL as redirect param
        return 302 /sandbox-provision/$openclaw_user?redirect=$scheme://$host$request_uri;
    }

    # Sandbox auto-provisioner endpoint
    location ~ ^/sandbox-provision/([a-zA-Z0-9_-]+)$ {
        proxy_pass http://sandbox_provisioner/provision/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    # Sandbox status endpoint (returns sshPort for existing sandboxes)
    location ~ ^/sandbox-status/([a-zA-Z0-9_-]+)$ {
        proxy_pass http://sandbox_provisioner/status/$1;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin * always;
    }

    # Backend docs (Swagger)
    location /docs { return 404; }
    location /docs-swagger { return 404; }
    location /openapi.json { return 404; }
    location /redoc { return 404; }

    # MinIO console
    location /minio/ { return 404; }
}

# ─── Cloudflare Tunnel endpoint (plain HTTP, port 8080) ───
# cloudflared connects here, Cloudflare handles HTTPS termination
server {
    listen 8080;
    server_name _;
    client_max_body_size 100M;

    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /auth/register-direct { proxy_pass http://backend_api/auth/register-direct; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }
    location /auth/register { proxy_pass http://backend_api/auth/register; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }
    location /auth/reset-password { proxy_pass http://backend_api/auth/reset-password; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }
    location /auth/change-password { proxy_pass http://backend_api/auth/change-password; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }
    location /auth/verify-email { proxy_pass http://backend_api/auth/verify-email; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }
    location /auth/request-reset { proxy_pass http://backend_api/auth/request-reset; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }
    location /auth/resend-verification { proxy_pass http://backend_api/auth/resend-verification; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }
    location /auth/keys { proxy_pass http://backend_api/auth/keys; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }

    location /oauth/ {
        proxy_pass http://backend_api/oauth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
        proxy_pass http://backend_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # OpenClaw UI: /openclaw-ui → per-user gateway (via cookie) or central gateway (fallback)
    location ~ ^/openclaw-ui(?:/(.*))?$ {
        resolver 127.0.0.11 valid=10s;
        set $openclaw_target openclaw-gateway;
        if ($cookie_openclaw_sandbox) {
            set $openclaw_target openclaw-$cookie_openclaw_sandbox;
        }
        proxy_pass http://$openclaw_target:18789/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header X-Frame-Options;
        add_header Content-Security-Policy "frame-ancestors 'self'" always;
    }

    # Per-user OpenClaw UI: /openclaw-user/{username}[/path] → openclaw-{username}:18789/[path]
    # Auto-provisions sandbox on 502 (container not found)
    location ~ ^/openclaw-user/([a-zA-Z0-9_-]+)(?:/(.*))?$ {
        resolver 127.0.0.11 valid=10s;
        set $openclaw_user $1;
        set $openclaw_path $2;
        proxy_pass http://openclaw-$openclaw_user:18789/$openclaw_path;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header X-Frame-Options;
        add_header Content-Security-Policy "frame-ancestors 'self'" always;
        proxy_intercept_errors on;
        error_page 502 = @provision_sandbox_cf;
    }

    location @provision_sandbox_cf {
        return 302 /sandbox-provision/$openclaw_user?redirect=https://$host$request_uri;
    }

    location ~ ^/sandbox-provision/([a-zA-Z0-9_-]+)$ {
        proxy_pass http://sandbox_provisioner/provision/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    location /openclaw-api/ {
        proxy_pass http://openclaw-gateway:18789/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }
}
